name: Node.js Bindings Publish Call

on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-and-test-nodejs
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # ratchet:actions/setup-node@v6
        with:
          node-version: 22

      - name: Verify version consistency
        working-directory: bindings/nodejs
        run: node scripts/sync-version.js --check

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: bindings/nodejs
        run: yarn install

      - name: Create npm dirs
        working-directory: bindings/nodejs
        run: yarn napi create-npm-dirs

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8
        with:
          path: bindings/nodejs/artifacts

      - name: Move artifacts
        working-directory: bindings/nodejs
        run: |
          yarn artifacts
          cp artifacts/bindings-js/index.js artifacts/bindings-js/index.d.ts .

      - name: List packages
        working-directory: bindings/nodejs
        run: ls -R ./npm
        shell: bash

      - name: Publish
        working-directory: bindings/nodejs
        run: |
          npm config set provenance true
          TAG="${GITHUB_REF_NAME:-}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
            npm publish --access public
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
            npm publish --tag next --access public
          else
            echo "No release tag detected (GITHUB_REF_NAME='$TAG'), skipping publish"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Build and test Node.js bindings FIRST
  # This also ensures version sync before any publishing
  build-and-test-nodejs:
    name: Build & Test Node.js
    uses: ./.github/workflows/nodejs-build-call.yml
